<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النتيجة النهائية - تحدي المعلوماتية</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 
            color: white; text-align: center;
            padding: 10px 0 20px 0; 
            box-sizing: border-box;
            overflow: hidden;
            transition: background-image 0.5s ease-in-out;
        }
#displayScore {
    animation: glow 1.5s ease-in-out infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00f2ff; }
    to { text-shadow: 0 0 30px #00f2ff, 0 0 10px #ffffff; }
}
        /* الطبقة العلوية للنتيجة */
        .top-info {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(15px);
            width: 85%; 
            max-width: 600px;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #00f2ff;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
            animation: slideDown 0.8s ease-out;
        }

        .top-info h2 { 
            margin: 0 0 10px 0; 
            font-size: 22px; 
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .top-info .score { 
            font-size: 48px; 
            font-weight: 900; 
            color: #00f2ff; 
            margin: 0; 
            line-height: 1;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.8);
        }

        /* أنيميشن الدخول */
        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .middle-space { flex-grow: 1; }

        /* منطقة الأزرار */
        .bottom-action {
            width: 100%;
            max-width: 350px;
            margin-bottom: 10px;
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            background: linear-gradient(45deg, #00c6ff, #0072ff); 
            color: white; border: none; cursor: pointer;
            font-size: 20px; font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 114, 255, 0.5);
            transition: 0.3s all;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-main:hover { 
            transform: scale(1.05) translateY(-3px); 
            box-shadow: 0 10px 25px #00f2ff; 
        }

        .btn-main:active { transform: scale(0.98); }
    </style>
</head>
<body id="resultBody">

    <div class="top-info">
        <h2 id="congratsText">جاري حساب النتيجة...</h2>
        <div class="score" id="displayScore">0 / 10</div>
    </div>

    <div class="middle-space"></div>

    <div class="bottom-action">
        <button class="btn-main" id="retryBtn" onclick="restartGame()">
            إعادة التحدي 🔄
        </button>
    </div>
<script>
const winSound = new Audio('win.mp3');
winSound.preload = 'auto'; 

window.onload = function() {
    // 2. تشغيل الصوت
    winSound.play().then(() => {
        console.log("تم تشغيل الصوت بنجاح فوراً!");
    }).catch(error => {
        console.log("تأمين التشغيل...");
        window.addEventListener('mouseover', () => { winSound.play(); }, { once: true });
    });

    // 3. جلب البيانات - التعديل هنا ليتطابق مع صفحة البداية
    const finalScore = parseInt(localStorage.getItem('finalScore')) || 0;
    
    // قمنا بتغيير userName إلى studentName ليتطابق مع ما حفظتيه سابقاً
    // وأضفنا "karen" كقيمة افتراضية في حال لم يتم إدخال اسم
    const userName = localStorage.getItem('studentName') || "لاعب"; 

    document.getElementById('displayScore').innerText = finalScore + " / 10";
    
    const congratsText = document.getElementById('congratsText');
    const body = document.getElementById('resultBody');

    // 4. تغيير الصور والنصوص لتظهر العبارة المطلوبة
    if (finalScore >= 9) {
        congratsText.innerText = "أنتِ عبقري يا " + userName + "! 🏆";
        body.style.backgroundImage = "url('5.png')";
    } else if (finalScore >= 5) {
        // سيظهر هنا: أحسنتِ يا karen (أو الاسم المدخل)
        congratsText.innerText = "أحسنتِ يا " + userName + "! ⭐"; 
        body.style.backgroundImage = "url('4.png')";
    } else {
        congratsText.innerText = "محاولة جيدة يا " + userName + "، استمر! 💪";
        body.style.backgroundImage = "url('3.png')";
    }
};

function restartGame() {
    new Audio('click.mp3').play();
    setTimeout(() => { location.href = 'index.html'; }, 300);
}
</script>
   
</body>
</html>
