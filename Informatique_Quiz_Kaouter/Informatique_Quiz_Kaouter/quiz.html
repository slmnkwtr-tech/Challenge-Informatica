<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي المعلوماتية - الأسئلة</title>
    <style>
        body { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: url('1.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        .quiz-card { 
            background: rgba(10, 25, 47, 0.8); 
            backdrop-filter: blur(10px);
            width: 90%; max-width: 650px; padding: 40px; 
            border-radius: 30px; border: 1px solid rgba(0, 242, 255, 0.3);
            position: relative; text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .hint { font-size: 14px; color: #00f2ff; opacity: 0.8; margin-bottom: 10px; }
        
        .question { 
            font-size: 26px; font-weight: bold; margin-bottom: 30px; 
            color: white; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .option { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(0, 242, 255, 0.4); 
            padding: 15px; margin: 12px 0; border-radius: 15px; 
            color: white; font-size: 18px; cursor: pointer; width: 100%;
            transition: 0.3s ease; position: relative;
        }

        .option:hover { 
            background: rgba(0, 242, 255, 0.2); 
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
         #wrongStamp {
    filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.7)); /* توهج أحمر */
}
         #correctStamp {
    filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.7)); /* توهج أخضر */
}
        /* تعديل الختم ليظهر فقط عند الإجابة الصحيحة */
        .stamp { 
            position: absolute; top: -30px; left: -30px; 
            width: 100px; z-index: 100;
            display: none; /* مخفي افتراضياً */
        }

        /* تصميم لوحة المعلومات في الأعلى */
.stats-container {
    position: absolute;
    top: -70px; /* تظهر فوق البطاقة */
    width: 100%;
    display: flex;
    justify-content: space-around;
    gap: 20px;
}

.stat-item {
    background: rgba(10, 25, 47, 0.9);
    border: 1px solid #00f2ff;
    padding: 10px 25px;
    border-radius: 50px;
    color: #00f2ff;
    font-weight: bold;
    font-size: 20px;
    box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
    display: flex;
    align-items: center;
    gap: 10px;
}

.stat-item span {
    color: white; /* الأرقام باللون الأبيض لتكون واضحة */
}
    </style>
</head>
<body>

<div class="quiz-card">
    <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" id="correctStamp" class="stamp">
    <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" id="correctStamp" class="stamp">
    <img src="https://cdn-icons-png.flaticon.com/512/190/190406.png" id="wrongStamp" class="stamp">
    <div class="stats-container">
    <div class="stat-item">
        ⌛ الوقت: <span id="timer">30</span>
    </div>

    <div class="stat-item">
        🏆 النتيجة: <span id="score">0</span>
    </div>
</div>

    <div class="hint">ملاحظة رقيقة: اختر إجابة واحدة فقط.</div>
    <div class="question" id="questionText">السؤال 1: ما هو المكون البرمجي الذي يمثل "عقل" الحاسوب؟</div>

    <div id="optionsContainer">
        <button class="option" onclick="checkAnswer(this, true)">وحدة المعالجة المركزية (CPU)</button>
        <button class="option" onclick="checkAnswer(this, false)">الذاكرة العشوائية (RAM)</button>
        <button class="option" onclick="checkAnswer(this, false)">الشاشة</button>
    </div>
</div>

<script>
    var studentName = localStorage.getItem('userName') || "يا بطل";
    var score = 0;

   function checkAnswer(element, isCorrect) {
    var allOptions = document.querySelectorAll('.option');
    allOptions.forEach(opt => opt.disabled = true);

    if(isCorrect) {
        score = 1; // لأننا نملك سؤالاً واحداً حالياً
        document.getElementById('score').innerText = score;
        element.style.background = "rgba(40, 167, 69, 0.4)";
        document.getElementById('correctStamp').style.display = "block";
    } else {
        score = 0;
        element.style.background = "rgba(220, 53, 69, 0.4)";
        document.getElementById('wrongStamp').style.display = "block";
    }

    // الانتظار ثانية واحدة ثم الانتقال لصفحة النتيجة
    setTimeout(function() {
        localStorage.setItem('finalScore', score); // حفظ النتيجة
        window.location.href = "result.html"; // الانتقال لصفحة النتيجة
    }, 1500);
}

    // كود التايمر البسيط
    var timeLeft = 30;
    var timerId = setInterval(function() {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(timerId);
            alert("انتهى الوقت!");
        }
    }, 1000);
</script>

</body>
</html>
