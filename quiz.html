<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي المعلوماتية - الأسئلة</title>
    <style>
        body { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: url('1.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        .quiz-card { 
            background: rgba(10, 25, 47, 0.8); 
            backdrop-filter: blur(10px);
            width: 90%; max-width: 650px; padding: 40px; 
            border-radius: 30px; border: 1px solid rgba(0, 242, 255, 0.3);
            position: relative; text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .hint { font-size: 14px; color: #00f2ff; opacity: 0.8; margin-bottom: 10px; }
        
        .question { 
            font-size: 26px; font-weight: bold; margin-bottom: 30px; 
            color: white; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .option { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(0, 242, 255, 0.4); 
            padding: 15px; margin: 12px 0; border-radius: 15px; 
            color: white; font-size: 18px; cursor: pointer; width: 100%;
            transition: 0.3s ease; position: relative;
        }

        .option:hover { 
            background: rgba(0, 242, 255, 0.2); 
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        #wrongStamp { filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.7)); }
        #correctStamp { filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.7)); }

        .stamp { 
            position: absolute; top: -30px; left: -30px; 
            width: 100px; z-index: 100;
            display: none;
        }

        .stats-container {
            position: absolute; top: -70px; width: 100%;
            display: flex; justify-content: space-around; gap: 20px;
        }

        .stat-item {
            background: rgba(10, 25, 47, 0.9);
            border: 1px solid #00f2ff; padding: 10px 25px;
            border-radius: 50px; color: #00f2ff;
            font-weight: bold; font-size: 20px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        @media (orientation: landscape) and (max-height: 500px) {
            .quiz-card { flex-direction: row; flex-wrap: wrap; padding: 15px; margin-top: 45px; gap: 10px; }
            .question { width: 45%; font-size: 18px; margin: 0; }
            #optionsContainer { width: 50%; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
            .option { padding: 8px; font-size: 14px; margin: 0; }
            .stamp { width: 60px; top: -20px; }
        }
    </style>
</head>
<body>

<div class="quiz-card">

    <img src="https://cdn-icons-png.flaticon.com/512/190/190406.png" id="wrongStamp" class="stamp">

// المتغيرات العامة
var score = 0;
var currentQuestionIndex = 0;
var quizQuestions = [];
var selectedForCurrent = []; 
var timeLeft = 20;
var timerId;
// في ملف الأسئلة (quiz.html)
window.onload = function() {
    prepareQuiz(); 
};
 function prepareQuiz() {
    // 1. جلب البيانات من الذاكرة
    const selectedLessons = JSON.parse(localStorage.getItem('selectedLessons')) || []; 
    const userLevel = parseInt(localStorage.getItem('selectedLevel')) || 1;
    
    // 2. تصفير المصفوفة للبدء من جديد
    quizQuestions = [];

    // 3. تحديد نطاق الأسئلة (Start & End) بناءً على المستوى
    let start, end;
    if (userLevel === 1) { start = 0; end = 3; }      
    else if (userLevel === 2) { start = 3; end = 6; } 
    else { start = 6; end = 9; }                      

    // 4. جمع 3 أسئلة من كل درس مختار (المجموع 9)
    selectedLessons.forEach(lesson => {
        if (allQuestions[lesson]) {
            let levelQuestions = allQuestions[lesson].slice(start, end);
            quizQuestions = quizQuestions.concat(levelQuestions);
        }
    });

    // 5. إضافة سؤال التحدي (البونص) ليصبح المجموع 10
    addBonusQuestion(userLevel);

   
    // 7. تصفير العداد والنتيجة والبدء
    if (quizQuestions.length > 0) {
        currentQuestionIndex = 0;
        score = 0;
        showQuestion();
    } else {
        document.getElementById('questionText').innerText = "خطأ في تحميل الأسئلة، تأكد من اختيار الدروس!";
    }
}

function addBonusQuestion(level) {
    const bonusData = {
        "1": { q: "تحدي (سهل): ما هو اختصار الحاسوب الشخصي؟", options: ["PC", "TV", "OS"], correct: [0], limit: 1 },
        "2": { q: "تحدي (متوسط): لغة برمجة شهيرة تستخدم للذكاء الاصطناعي؟", options: ["Python", "HTML", "CSS"], correct: [0], limit: 1 },
        "3": { q: "تحدي (صعب): ما هو النظام العددي الذي يعتمد على 0 و 1؟", options: ["العشري", "الثنائي (Binary)", "الستة عشري"], correct: [1], limit: 1 }
    };
    
    if (bonusData[level]) {
        quizQuestions.push(bonusData[level]);
    }
}

function showQuestion() {
    if (currentQuestionIndex >= quizQuestions.length) {
        finishQuiz();
        return;
    }

    selectedForCurrent = []; 
    const qData = quizQuestions[currentQuestionIndex];
    
    // تحديث الملاحظة ونص السؤال
    document.getElementById('hintText').innerText = (qData.limit === 2) ? "ملاحظة: اختر إجابتين لهذا السؤال." : "ملاحظة : اختر إجابة واحدة فقط.";
    document.getElementById('questionText').innerText = `سؤال ${currentQuestionIndex + 1}: ${qData.q}`;
    
    const container = document.getElementById('optionsContainer');
    container.innerHTML = "";
    
    // إنشاء الأزرار
    let buttons = [];
    qData.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = "option";
        btn.innerText = opt;
        btn.onclick = () => handleSelection(btn, index); 
        buttons.push(btn);
    });

    // خلط الأزرار عشوائياً
    buttons.sort(() => Math.random() - 0.5);

    // إضافتها للحاوية
    buttons.forEach(btn => container.appendChild(btn));

    // إخفاء الأختام وتصفير المؤقت
    document.getElementById('correctStamp').style.display = "none";
    document.getElementById('wrongStamp').style.display = "none";
    resetTimer();
}
function handleSelection(element, optionIndex) {
    const qData = quizQuestions[currentQuestionIndex];
    const allOptions = document.querySelectorAll('.option');
    
    allOptions.forEach(btn => btn.disabled = true);
    clearInterval(timerId);
    
    // التعديل هنا: نتحقق إذا كان نص الزر المضغوط موجوداً ضمن الخيارات الصحيحة الأصلية
    const correctOptionsTexts = qData.correct.map(idx => qData.options[idx]);
    const isCorrect = correctOptionsTexts.includes(element.innerText);

    if(isCorrect) {
        playSfx('correct');
        score++;
        document.getElementById('score').innerText = score;
        element.style.background = "rgba(39, 174, 96, 0.9)"; 
        document.getElementById('correctStamp').style.display = "block";
    } else {
        playSfx('wrong');
        element.style.background = "rgba(192, 57, 43, 0.9)"; 
        document.getElementById('wrongStamp').style.display = "block";
        
        // إظهار الإجابة الصحيحة للمستخدم (اختياري)
        allOptions.forEach(btn => {
            if (correctOptionsTexts.includes(btn.innerText)) {
                btn.style.border = "2px solid #27ae60";
            }
        });
    }

    setTimeout(() => {
        currentQuestionIndex++;
        showQuestion();
    }, 1500);
}
function resetTimer() {
    clearInterval(timerId);
    timeLeft = 20;
    document.getElementById('timer').innerText = timeLeft;
    
    timerId = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(timerId);
           
            handleTimeOut(); 
        }
    }, 1000);
}


function handleTimeOut() {
    playSfx('wrong');
    document.getElementById('wrongStamp').style.display = "block";
    
    // تعطيل الأزرار لكي لا يضغط المستخدم بعد انتهاء الوقت
    const allOptions = document.querySelectorAll('.option');
    allOptions.forEach(btn => btn.disabled = true);

    setTimeout(() => {
        currentQuestionIndex++;
        showQuestion();
    }, 1500);
}

function finishQuiz() {
    // 1. حفظ النتيجة في الذاكرة
    localStorage.setItem('finalScore', score);

    // 2. إخفاء الأسئلة وإظهار زر الانتقال
    const container = document.querySelector('.quiz-card');
    container.innerHTML = `
        <h2 style="color: white; margin-bottom: 20px;">انتهت الأسئلة!</h2>
        <p style="color: #00f2ff; font-size: 20px; margin-bottom: 30px;">اضغط على الزر أدناه لاستلام نتيجتك .</p>
        <button class="option" style="background: #00f2ff; color: #0a192f; font-weight: bold; padding: 20px;" 
                onclick="goToResult()">
            عرض النتيجة النهائية 🏆
        </button>
    `;
}

// دالة الانتقال الفعلي
function goToResult() {
    playSfx('click');
    window.location.href = "result.html";
}
